# Build + déploiement sur Cloudflare Pages.
# Pré-requis (Settings → Secrets and variables → Actions) :
#   CLOUDFLARE_API_TOKEN     — Token avec scope "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID    — ID compte Cloudflare
#   VITE_SITE_URL            — https://attitude-voyages.fr (var, pas secret)
#   VITE_GA4_MEASUREMENT_ID  — (optionnel) ID GA4
#   VITE_GTM_ID              — (optionnel) ID GTM
#
# Les secrets backend (RESEND_API_KEY, etc.) sont configurés directement
# dans Cloudflare Pages → Settings → Environment variables.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cf-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (with prerender)
        env:
          VITE_SITE_URL: https://attitude-voyages.fr
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
          VITE_GTM_ID: ${{ secrets.VITE_GTM_ID }}
        run: npm run build:prerender

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=attitude-voyages --branch=main
